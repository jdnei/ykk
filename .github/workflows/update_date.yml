name: Daily Date Update & Sync to Gitee and GitLab

on:
  schedule:
    # 每天北京时间上午 11:31 自动运行
    # GitHub Actions 使用 UTC 时间，所以 03:31 UTC = 北京时间 11:31
    - cron: '31 3 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  update-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，以支持强制推送到 Gitee / GitLab

      - name: Update Date and Fix Image Links
        run: |
          # 1. 获取北京时间当前日期 (格式：2026年2月12日)
          CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y年%-m月%-d日')
          
          # 2. 自动更新日期：匹配 (xxxx年x月x日更新)
          # 不管前面是“伞伞导航”还是其他文字都能生效
          sed -i "s/([0-9]\{4\}年[0-9]\{1,2\}月[0-9]\{1,2\}日更新)/($CURRENT_DATE更新)/g" README.md
          
          # 3. 自动修复 Gitee 图片不显示：给图片链接末尾加上 ?raw=true
          # 针对 png, jpg, jpeg, gif 后缀进行处理
          sed -i 's/\(\.png\|\.jpg\|\.jpeg\|\.gif\))/\1?raw=true)/g' README.md
          
          # 4. 防止重复添加 ?raw=true
          sed -i 's/?raw=true?raw=true/?raw=true/g' README.md

      - name: Commit and Push to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # 只有在内容有变化时才提交，防止没有变化时报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update date" && git push)

      - name: Force Push to Gitee
        run: |
          # 同步到 Gitee
          # 通用推送命令：自动抓取当前 GitHub 的“用户名/仓库名”
          # 请确保已在 GitHub Settings -> Secrets and variables -> Actions 中设置了 GITEE_TOKEN
          git push --force https://jdnei:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ github.repository }}.git main

      - name: Force Push to GitLab
        run: |
          # 同步到 GitLab
          # 自动抓取当前 GitHub 仓库名，然后推送到 GitLab 的 jdnei/同名仓库
          # 例如：
          # 当前 GitHub 仓库是 jdnei/sansandaohang
          # 就会自动推送到 gitlab.com/jdnei/sansandaohang
          #
          # 请确保：
          # 1. GitHub Secrets 里已经设置了 GITLAB_TOKEN
          # 2. GitLab 上已经提前创建好同名空仓库
          # 3. GitLab 仓库默认分支是 main，或者允许推送 main 分支
          git push --force https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jdnei/${{ github.event.repository.name }}.git main
